# NAAMI — Nginx reverse proxy for the OVH VPS.
# Copy to /etc/nginx/sites-available/naami, symlink into sites-enabled,
# replace naami.example.com with your domain, then run:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d naami.example.com -d www.naami.example.com
# Certbot rewrites this file to add the :443 TLS block and an HTTP->HTTPS redirect.

upstream naami_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name naami.example.com www.naami.example.com;

    # Uploads / request body cap
    client_max_body_size 10M;

    # gzip (Next also sets compress:true, this covers proxied responses)
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long-cache immutable build assets (hashed filenames)
    location /_next/static/ {
        proxy_pass http://naami_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://naami_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
